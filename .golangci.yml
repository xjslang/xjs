linters:
  default: standard
  enable:
    - depguard

linters-settings:
  depguard:
    rules:
      main:
        deny:
          - pkg: "reflect"
            desc: "reflection is banned to keep WASM size small"
          - pkg: "encoding/json"
            desc: "encoding/json uses reflection"
          - pkg: "fmt"
            desc: "fmt uses reflection"

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Allow reflection-using packages in test files
    - path: _test\.go
      linters:
        - depguard
