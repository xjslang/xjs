linters:
  default: standard
  enable:
    - depguard
    - gofumpt

linters-settings:
  gofumpt:
    extra-rules: true
  depguard:
    rules:
      main:
        deny:
          - pkg: "reflect"
            desc: "reflection is banned to keep WASM size small"
          - pkg: "encoding/json"
            desc: "encoding/json uses reflection"
          - pkg: "fmt"
            desc: "fmt uses reflection"
          - pkg: "github.com/davecgh/go-spew/spew"
            desc: "spew uses reflection"
          - pkg: "github.com/xjslang/xjs/internal"
            desc: "internal package is for tests only"

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Allow reflection-using packages in test files
    - path: _test\.go
      linters:
        - depguard
    # Allow internal package to use reflection internally
    - path: internal/
      linters:
        - depguard
